name: Harness CI/CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile
        run: python -m compileall .

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Prepare key
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > key.pem
          chmod 600 key.pem
      - name: Resolve host and deploy
        run: |
          HOST=$(aws ec2 describe-instances --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" --query 'Reservations[0].Instances[0].PublicIpAddress' --output text)

          ssh -i key.pem -o StrictHostKeyChecking=no ubuntu@$HOST "mkdir -p /home/ubuntu/projet_industriel_agi"

          scp -i key.pem -o StrictHostKeyChecking=no -r docker-compose.harness.yml harness_backend ubuntu@$HOST:/home/ubuntu/projet_industriel_agi/

          ssh -i key.pem -o StrictHostKeyChecking=no ubuntu@$HOST "cd /home/ubuntu/projet_industriel_agi && docker compose -f docker-compose.harness.yml up -d --build"

name: Harness CI/CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile
        run: |
          set -euo pipefail
          python -m compileall .

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Prepare SSH key
        run: |
          set -euo pipefail
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > key.pem
          chmod 600 key.pem
          ssh-keygen -y -f key.pem > /dev/null

      - name: Resolve host
        id: resolve_host
        run: |
          set -euo pipefail
          HOST=$(aws ec2 describe-instances \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          if [ -z "$HOST" ] || [ "$HOST" = "None" ]; then
            echo "EC2 public IP not found"
            exit 1
          fi
          echo "host=$HOST" >> "$GITHUB_OUTPUT"

      - name: SSH smoke test
        run: |
          set -euo pipefail
          ssh -i key.pem -o StrictHostKeyChecking=no -o ConnectTimeout=20 ubuntu@${{ steps.resolve_host.outputs.host }} "echo REMOTE_OK"

      - name: Sync files
        run: |
          set -euo pipefail
          ssh -i key.pem -o StrictHostKeyChecking=no ubuntu@${{ steps.resolve_host.outputs.host }} "mkdir -p /home/ubuntu/projet_industriel_agi"
          scp -i key.pem -o StrictHostKeyChecking=no -r \
            . \
            ubuntu@${{ steps.resolve_host.outputs.host }}:/home/ubuntu/projet_industriel_agi/repo

      - name: Deploy stack
        run: |
          set -euo pipefail
          ssh -i key.pem -o StrictHostKeyChecking=no ubuntu@${{ steps.resolve_host.outputs.host }} \
            "cd /home/ubuntu/projet_industriel_agi/repo && docker compose -f docker-compose.harness.yml up -d --build"

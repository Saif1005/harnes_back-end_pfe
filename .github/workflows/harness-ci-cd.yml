name: Harness CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install harness dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r harness_backend/requirements.txt

      - name: Compile and basic checks
        run: |
          python -m compileall harness_backend
          python -m py_compile scripts/deploy_harness_to_instance.sh scripts/rsync_to_ec2.sh
          python -m py_compile scripts/train_harness_models.py scripts/train_harness_prediction.py

      - name: Dry smoke test
        run: |
          python -c "from harness_backend.core.state import new_state; from harness_backend.graph.builder import build_harness_graph; g=build_harness_graph(); s=g.run(new_state('classer amidon')); print(s.get('route'))"

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Prepare SSH key
        run: |
          mkdir -p /tmp/keys
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > /tmp/keys/saif_pipeline.pem
          chmod 600 /tmp/keys/saif_pipeline.pem

      - name: Deploy to EC2
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          KEY_PATH: /tmp/keys/saif_pipeline.pem
          SSH_USER: ubuntu
          REMOTE_DIR: /home/ubuntu/projet_industriel_agi
        run: |
          bash scripts/deploy_harness_to_instance.sh

